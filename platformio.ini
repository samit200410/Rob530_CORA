; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

[env:client]
build_src_filter = +<Client_Wifi.cpp>
upload_port = /dev/cu.usbserial-0001
monitor_port = /dev/cu.usbserial-0001

[env:server1]
build_src_filter = +<Server_Wifi.cpp>
upload_port = /dev/cu.usbserial-0001
monitor_port = /dev/cu.usbserial-0001
build_flags = -D WIFI_CHANNEL=1

[env:server2]
build_src_filter = +<Server_Wifi.cpp>
upload_port = /dev/cu.usbserial-7
monitor_port = /dev/cu.usbserial-7
build_flags = -D WIFI_CHANNEL=6

[env:server3]
build_src_filter = +<Server_Wifi.cpp>
upload_port = /dev/cu.usbserial-8
monitor_port = /dev/cu.usbserial-8
build_flags = -D WIFI_CHANNEL=11

[env:server4]
build_src_filter = +<Server_Wifi.cpp>
upload_port = /dev/cu.usbserial-9   ; Change to your actual port
monitor_port = /dev/cu.usbserial-9  ; Change to your actual port
build_flags = -D WIFI_CHANNEL=4

[env:server5]
build_src_filter = +<Server_Wifi.cpp>
upload_port = /dev/cu.usbserial-10   ; Change to your actual port
monitor_port = /dev/cu.usbserial-10  ; Change to your actual port
build_flags = -D WIFI_CHANNEL=8

[env:random]
build_src_filter = +<Random_Data.cpp>
upload_port = COM5
monitor_port = COM5